<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body { background:#000; display:flex; align-items:center; justify-content:center; min-height:100vh; font-family:'Segoe UI',Arial,sans-serif; }
  .canvas { width:1080px; height:1920px; background:#04060e; position:relative; overflow:hidden; display:flex; flex-direction:column; align-items:center; justify-content:center; }
  .aurora { position:absolute; inset:0; background:
    radial-gradient(ellipse 120% 44% at 50% 0%,  rgba(240,0,240,0.34) 0%, transparent 46%),
    radial-gradient(ellipse 80%  48% at 0%  50%, rgba(160,0,230,0.20) 0%, transparent 50%),
    radial-gradient(ellipse 80%  48% at 100% 50%,rgba(0,0,230,0.17) 0%, transparent 50%),
    radial-gradient(ellipse 120% 44% at 50% 100%,rgba(140,0,220,0.30) 0%, transparent 46%);
  }
  .grid { position:absolute; inset:0; background-image:linear-gradient(rgba(255,215,0,0.05) 1px,transparent 1px),linear-gradient(90deg,rgba(255,215,0,0.05) 1px,transparent 1px); background-size:90px 90px; }
  .border-glow { position:absolute; inset:18px; border:1.5px solid rgba(201,162,39,0.52); border-radius:6px; box-shadow:inset 0 0 200px rgba(201,162,39,0.09),0 0 120px rgba(201,162,39,0.11); }
  .corner { position:absolute; width:72px; height:72px; border-color:#FFD700; border-style:solid; opacity:0.95; }
  .corner-tl { top:26px; left:26px; border-width:3px 0 0 3px; }
  .corner-tr { top:26px; right:26px; border-width:3px 3px 0 0; }
  .corner-bl { bottom:26px; left:26px; border-width:0 0 3px 3px; }
  .corner-br { bottom:26px; right:26px; border-width:0 3px 3px 0; }
  .dot { position:absolute; border-radius:50%; background:#FFD700; }
  .content { position:relative; z-index:10; text-align:center; padding:80px 90px; display:flex; flex-direction:column; align-items:center; width:100%; }
  .top-line { width:1px; height:100px; background:linear-gradient(180deg,transparent,rgba(201,162,39,0.55),transparent); margin-bottom:32px; }
  .alert-pill { background:rgba(255,100,0,0.15); border:1px solid rgba(255,120,0,0.48); border-radius:40px; padding:10px 30px; font-size:15px; letter-spacing:5px; color:rgba(255,160,50,0.95); text-transform:uppercase; margin-bottom:30px; font-weight:700; }
  .lbl { font-size:22px; letter-spacing:9px; color:rgba(255,255,255,0.46); text-transform:uppercase; margin-bottom:8px; }
  .num { font-size:320px; font-weight:900; line-height:0.86;
    background:linear-gradient(135deg,#FFD700 0%,#E8C020 20%,#FFD700 50%,#FFF5A0 100%);
    -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text;
    letter-spacing:-18px; filter:drop-shadow(0 0 80px rgba(255,215,0,0.75));
  }
  .unit { font-size:32px; letter-spacing:14px; color:rgba(255,215,0,0.78); text-transform:uppercase; margin-bottom:50px; margin-top:12px; }
  .divider { width:320px; height:1.5px; background:linear-gradient(90deg,transparent,#FFD700,transparent); margin-bottom:46px; }
  .headline { font-size:48px; font-weight:800; color:#fff; line-height:1.24; margin-bottom:20px; max-width:880px; }
  .headline em { font-style:normal; background:linear-gradient(90deg,#FFD700,#FFF3A3); -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text; }
  .sub { font-size:26px; color:rgba(255,255,255,0.44); max-width:820px; line-height:1.6; margin-bottom:48px; }
  .cta { background:linear-gradient(135deg,rgba(201,162,39,0.18),rgba(201,162,39,0.07)); border:1.5px solid rgba(255,215,0,0.55); border-radius:10px; padding:28px 80px; margin-bottom:54px; }
  .cta-top { font-size:16px; letter-spacing:5px; color:rgba(255,215,0,0.62); text-transform:uppercase; margin-bottom:8px; }
  .cta-main { font-size:38px; font-weight:800; color:#FFD700; letter-spacing:2px; }
  .bot-line { width:1px; height:80px; background:linear-gradient(180deg,rgba(201,162,39,0.55),transparent); margin-bottom:36px; }
  .logo-img { height:72px; opacity:0.88; filter:drop-shadow(0 0 22px rgba(255,215,0,0.35)); }
</style>
</head>
<body>
<div class="canvas">
  <div class="aurora"></div><div class="grid"></div>
  <div class="border-glow"></div>
  <div class="corner corner-tl"></div><div class="corner corner-tr"></div>
  <div class="corner corner-bl"></div><div class="corner corner-br"></div>
  <div class="dot" style="width:7px;height:7px;top:6%;left:8%;opacity:0.32"></div>
  <div class="dot" style="width:10px;height:10px;top:10%;right:9%;opacity:0.28"></div>
  <div class="dot" style="width:5px;height:5px;bottom:6%;left:6%;opacity:0.32"></div>
  <div class="dot" style="width:8px;height:8px;bottom:10%;right:7%;opacity:0.28"></div>
  <div class="dot" style="width:4px;height:4px;top:46%;left:3%;opacity:0.22"></div>
  <div class="dot" style="width:4px;height:4px;top:52%;right:3%;opacity:0.22"></div>
  <div class="content">
    <div class="top-line"></div>
    <div class="alert-pill">🔥 ¡CASI ES LA HORA!</div>
    <div class="lbl">Faltan</div>
    <div class="num">2</div>
    <div class="unit">Horas</div>
    <div class="divider"></div>
    <div class="headline"><em>¡El momento llegó!</em><br>Prepárate para entrar</div>
    <div class="sub">En 2 horas abre el sistema que va a transformar la forma en que ganas dinero</div>
    <div class="cta">
      <div class="cta-top">Entra esta noche a las</div>
      <div class="cta-main">9:00 PM · Lunes 6</div>
    </div>
    <div class="bot-line"></div>
    <img class="logo-img" src="../logo-skyteam-white.png" alt="Sky Team">
  </div>
</div>
</body>
</html>
