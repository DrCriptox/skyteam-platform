<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body { background:#000; display:flex; align-items:center; justify-content:center; min-height:100vh; font-family:'Segoe UI',Arial,sans-serif; }
  .canvas { width:1080px; height:1920px; background:#060810; position:relative; overflow:hidden; display:flex; flex-direction:column; align-items:center; justify-content:center; }
  .aurora { position:absolute; inset:0; background:
    radial-gradient(ellipse 100% 40% at 50% 0%,  rgba(160,0,230,0.30) 0%, transparent 48%),
    radial-gradient(ellipse 80%  45% at 10% 50%, rgba(120,0,200,0.18) 0%, transparent 50%),
    radial-gradient(ellipse 80%  45% at 90% 50%, rgba(0,20,200,0.15) 0%, transparent 50%),
    radial-gradient(ellipse 100% 40% at 50% 100%,rgba(100,0,180,0.26) 0%, transparent 48%);
  }
  .grid { position:absolute; inset:0; background-image:linear-gradient(rgba(255,215,0,0.04) 1px,transparent 1px),linear-gradient(90deg,rgba(255,215,0,0.04) 1px,transparent 1px); background-size:90px 90px; }
  .border-glow { position:absolute; inset:18px; border:1px solid rgba(201,162,39,0.38); border-radius:6px; box-shadow:inset 0 0 160px rgba(201,162,39,0.05); }
  .corner { position:absolute; width:66px; height:66px; border-color:#C9A227; border-style:solid; opacity:0.80; }
  .corner-tl { top:26px; left:26px; border-width:2px 0 0 2px; }
  .corner-tr { top:26px; right:26px; border-width:2px 2px 0 0; }
  .corner-bl { bottom:26px; left:26px; border-width:0 0 2px 2px; }
  .corner-br { bottom:26px; right:26px; border-width:0 2px 2px 0; }
  .dot { position:absolute; border-radius:50%; background:#FFD700; }
  .content { position:relative; z-index:10; text-align:center; padding:80px 90px; display:flex; flex-direction:column; align-items:center; width:100%; }
  .top-line { width:1px; height:120px; background:linear-gradient(180deg,transparent,rgba(201,162,39,0.45),transparent); margin-bottom:44px; }
  .lbl { font-size:22px; letter-spacing:9px; color:rgba(255,255,255,0.42); text-transform:uppercase; margin-bottom:12px; }
  .num { font-size:280px; font-weight:900; line-height:0.90;
    background:linear-gradient(135deg,#FFD700 0%,#C9A227 30%,#FFD700 60%,#FFF3A3 100%);
    -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text;
    letter-spacing:-10px; filter:drop-shadow(0 0 65px rgba(255,215,0,0.60));
  }
  .unit { font-size:32px; letter-spacing:14px; color:rgba(255,215,0,0.65); text-transform:uppercase; margin-bottom:52px; margin-top:14px; }
  .divider { width:300px; height:1.5px; background:linear-gradient(90deg,transparent,#C9A227,transparent); margin-bottom:48px; }
  .headline { font-size:44px; font-weight:700; color:#fff; line-height:1.28; margin-bottom:20px; max-width:880px; }
  .headline em { font-style:normal; background:linear-gradient(90deg,#FFD700,#FFF3A3); -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text; }
  .sub { font-size:26px; color:rgba(255,255,255,0.40); max-width:820px; line-height:1.6; margin-bottom:44px; }
  .stats { display:flex; gap:0; margin-bottom:52px; border:1px solid rgba(201,162,39,0.28); border-radius:8px; overflow:hidden; }
  .stat { padding:22px 44px; text-align:center; border-right:1px solid rgba(201,162,39,0.20); }
  .stat:last-child { border-right:none; }
  .stat-n { font-size:40px; font-weight:800; color:#FFD700; }
  .stat-l { font-size:13px; letter-spacing:2px; color:rgba(255,255,255,0.35); text-transform:uppercase; margin-top:4px; }
  .box { display:inline-flex; flex-direction:column; align-items:center; background:rgba(201,162,39,0.10); border:1px solid rgba(201,162,39,0.38); border-radius:8px; padding:24px 70px; margin-bottom:60px; }
  .box-lbl { font-size:13px; letter-spacing:6px; color:rgba(201,162,39,0.60); text-transform:uppercase; margin-bottom:8px; }
  .box-date { font-size:32px; font-weight:700; color:#FFD700; letter-spacing:3px; }
  .bot-line { width:1px; height:80px; background:linear-gradient(180deg,rgba(201,162,39,0.45),transparent); margin-bottom:36px; }
  .logo-img { height:72px; opacity:0.88; filter:drop-shadow(0 0 20px rgba(255,215,0,0.30)); }
</style>
</head>
<body>
<div class="canvas">
  <div class="aurora"></div><div class="grid"></div>
  <div class="border-glow"></div>
  <div class="corner corner-tl"></div><div class="corner corner-tr"></div>
  <div class="corner corner-bl"></div><div class="corner corner-br"></div>
  <div class="dot" style="width:6px;height:6px;top:7%;left:8%;opacity:0.25"></div>
  <div class="dot" style="width:8px;height:8px;top:12%;right:10%;opacity:0.22"></div>
  <div class="dot" style="width:5px;height:5px;bottom:7%;left:6%;opacity:0.24"></div>
  <div class="dot" style="width:7px;height:7px;bottom:12%;right:8%;opacity:0.22"></div>
  <div class="content">
    <div class="top-line"></div>
    <div class="lbl">Faltan</div>
    <div class="num">8</div>
    <div class="unit">Horas</div>
    <div class="divider"></div>
    <div class="headline"><em>Esta noche entra al sistema</em><br>que ya usa tu competencia</div>
    <div class="sub">Franquicia digital completa · 6 agentes de IA · Todo en una plataforma</div>
    <div class="stats">
      <div class="stat"><div class="stat-n">6</div><div class="stat-l">Agentes IA</div></div>
      <div class="stat"><div class="stat-n">500+</div><div class="stat-l">Usuarios</div></div>
      <div class="stat"><div class="stat-n">∞</div><div class="stat-l">Potencial</div></div>
    </div>
    <div class="box">
      <div class="box-lbl">Lanzamiento oficial</div>
      <div class="box-date">Lunes 6 · 9:00 PM</div>
    </div>
    <div class="bot-line"></div>
    <img class="logo-img" src="../logo-skyteam-white.png" alt="Sky Team">
  </div>
</div>
</body>
</html>
