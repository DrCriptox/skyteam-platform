<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body { background:#000; display:flex; align-items:center; justify-content:center; min-height:100vh; font-family:'Segoe UI',Arial,sans-serif; }
  .canvas { width:1080px; height:1920px; background:#030509; position:relative; overflow:hidden; display:flex; flex-direction:column; align-items:center; justify-content:center; }
  .aurora { position:absolute; inset:0; background:
    radial-gradient(ellipse 130% 46% at 50% 0%,  rgba(255,20,220,0.35) 0%, transparent 44%),
    radial-gradient(ellipse 80%  50% at -5% 50%, rgba(180,0,240,0.22) 0%, transparent 50%),
    radial-gradient(ellipse 80%  50% at 105% 50%,rgba(0,0,255,0.18) 0%, transparent 50%),
    radial-gradient(ellipse 130% 46% at 50% 100%,rgba(160,0,230,0.32) 0%, transparent 44%);
  }
  .grid { position:absolute; inset:0; background-image:linear-gradient(rgba(255,215,0,0.06) 1px,transparent 1px),linear-gradient(90deg,rgba(255,215,0,0.06) 1px,transparent 1px); background-size:90px 90px; }
  .border-outer { position:absolute; inset:12px; border:1px solid rgba(201,162,39,0.25); border-radius:7px; }
  .border-glow  { position:absolute; inset:20px; border:2px solid rgba(255,215,0,0.65); border-radius:5px; box-shadow:inset 0 0 250px rgba(201,162,39,0.14),0 0 180px rgba(201,162,39,0.17); }
  .corner { position:absolute; width:76px; height:76px; border-color:#FFD700; border-style:solid; opacity:1; }
  .corner-tl { top:28px; left:28px; border-width:3px 0 0 3px; }
  .corner-tr { top:28px; right:28px; border-width:3px 3px 0 0; }
  .corner-bl { bottom:28px; left:28px; border-width:0 0 3px 3px; }
  .corner-br { bottom:28px; right:28px; border-width:0 3px 3px 0; }
  .dot { position:absolute; border-radius:50%; background:#FFD700; }
  .content { position:relative; z-index:10; text-align:center; padding:80px 90px; display:flex; flex-direction:column; align-items:center; width:100%; }
  .top-line { width:1px; height:80px; background:linear-gradient(180deg,transparent,rgba(255,215,0,0.60),transparent); margin-bottom:28px; }
  .fire-line { font-size:52px; letter-spacing:6px; margin-bottom:24px; }
  .lbl { font-size:22px; letter-spacing:9px; color:rgba(255,255,255,0.50); text-transform:uppercase; margin-bottom:6px; }
  .num { font-size:360px; font-weight:900; line-height:0.84;
    background:linear-gradient(135deg,#FFED60 0%,#FFD700 18%,#C9A227 38%,#FFD700 58%,#FFF7B0 100%);
    -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text;
    letter-spacing:-24px; filter:drop-shadow(0 0 100px rgba(255,215,0,0.85));
  }
  .unit { font-size:34px; letter-spacing:14px; color:#FFD700; text-transform:uppercase; margin-bottom:44px; margin-top:10px; }
  .divider { width:360px; height:2px; background:linear-gradient(90deg,transparent,#FFD700,transparent); margin-bottom:42px; }
  .headline { font-size:50px; font-weight:900; color:#fff; line-height:1.20; margin-bottom:18px; max-width:880px; text-transform:uppercase; letter-spacing:1px; }
  .headline em { font-style:normal; background:linear-gradient(90deg,#FFD700,#FFED60); -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text; }
  .sub { font-size:26px; color:rgba(255,255,255,0.48); max-width:820px; line-height:1.58; margin-bottom:44px; }
  .cta-big { background:linear-gradient(135deg,rgba(255,215,0,0.20),rgba(201,162,39,0.09)); border:2px solid rgba(255,215,0,0.70); border-radius:10px; padding:28px 90px; margin-bottom:50px; box-shadow:0 0 50px rgba(255,215,0,0.14); }
  .cta-top  { font-size:16px; letter-spacing:5px; color:rgba(255,215,0,0.65); text-transform:uppercase; margin-bottom:8px; }
  .cta-main { font-size:40px; font-weight:900; color:#FFD700; letter-spacing:3px; }
  .bot-line { width:1px; height:70px; background:linear-gradient(180deg,rgba(255,215,0,0.60),transparent); margin-bottom:32px; }
  .logo-img { height:76px; opacity:0.90; filter:drop-shadow(0 0 25px rgba(255,215,0,0.40)); }
</style>
</head>
<body>
<div class="canvas">
  <div class="aurora"></div><div class="grid"></div>
  <div class="border-outer"></div>
  <div class="border-glow"></div>
  <div class="corner corner-tl"></div><div class="corner corner-tr"></div>
  <div class="corner corner-bl"></div><div class="corner corner-br"></div>
  <div class="dot" style="width:7px;height:7px;top:6%;left:8%;opacity:0.42"></div>
  <div class="dot" style="width:11px;height:11px;top:9%;right:9%;opacity:0.36"></div>
  <div class="dot" style="width:5px;height:5px;bottom:6%;left:6%;opacity:0.40"></div>
  <div class="dot" style="width:9px;height:9px;bottom:9%;right:7%;opacity:0.36"></div>
  <div class="dot" style="width:5px;height:5px;top:44%;left:3%;opacity:0.28"></div>
  <div class="dot" style="width:5px;height:5px;top:50%;right:3%;opacity:0.28"></div>
  <div class="dot" style="width:3px;height:3px;top:34%;left:5%;opacity:0.22"></div>
  <div class="dot" style="width:3px;height:3px;top:64%;right:5%;opacity:0.22"></div>
  <div class="content">
    <div class="top-line"></div>
    <div class="fire-line">🔥🔥🔥</div>
    <div class="lbl">Falta</div>
    <div class="num">1</div>
    <div class="unit">Hora</div>
    <div class="divider"></div>
    <div class="headline"><em>¡ES AHORA!</em><br>El lanzamiento histórico</div>
    <div class="sub">En 60 minutos abre la plataforma que cambia todo. ¿Estás listo?</div>
    <div class="cta-big">
      <div class="cta-top">Lunes 6 · Esta noche</div>
      <div class="cta-main">9 : 0 0  P M</div>
    </div>
    <div class="bot-line"></div>
    <img class="logo-img" src="../logo-skyteam-white.png" alt="Sky Team">
  </div>
</div>
</body>
</html>
