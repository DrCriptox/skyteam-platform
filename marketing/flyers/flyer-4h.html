<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body { background:#000; display:flex; align-items:center; justify-content:center; min-height:100vh; font-family:'Segoe UI',Arial,sans-serif; }
  .canvas { width:1080px; height:1920px; background:#05070f; position:relative; overflow:hidden; display:flex; flex-direction:column; align-items:center; justify-content:center; }
  .aurora { position:absolute; inset:0; background:
    radial-gradient(ellipse 110% 42% at 50% 0%,  rgba(200,0,240,0.32) 0%, transparent 48%),
    radial-gradient(ellipse 80%  46% at 5%  50%, rgba(140,0,220,0.18) 0%, transparent 50%),
    radial-gradient(ellipse 80%  46% at 95% 50%, rgba(0,10,220,0.15) 0%, transparent 50%),
    radial-gradient(ellipse 110% 42% at 50% 100%,rgba(120,0,200,0.28) 0%, transparent 48%);
  }
  .grid { position:absolute; inset:0; background-image:linear-gradient(rgba(255,215,0,0.04) 1px,transparent 1px),linear-gradient(90deg,rgba(255,215,0,0.04) 1px,transparent 1px); background-size:90px 90px; }
  .border-glow { position:absolute; inset:18px; border:1px solid rgba(201,162,39,0.44); border-radius:6px; box-shadow:inset 0 0 180px rgba(201,162,39,0.07),0 0 80px rgba(201,162,39,0.07); }
  .corner { position:absolute; width:68px; height:68px; border-color:#FFD700; border-style:solid; opacity:0.88; }
  .corner-tl { top:26px; left:26px; border-width:3px 0 0 3px; }
  .corner-tr { top:26px; right:26px; border-width:3px 3px 0 0; }
  .corner-bl { bottom:26px; left:26px; border-width:0 0 3px 3px; }
  .corner-br { bottom:26px; right:26px; border-width:0 3px 3px 0; }
  .dot { position:absolute; border-radius:50%; background:#FFD700; }
  .content { position:relative; z-index:10; text-align:center; padding:80px 90px; display:flex; flex-direction:column; align-items:center; width:100%; }
  .top-line { width:1px; height:100px; background:linear-gradient(180deg,transparent,rgba(201,162,39,0.50),transparent); margin-bottom:36px; }
  .alert-pill { background:rgba(255,60,60,0.12); border:1px solid rgba(255,80,80,0.35); border-radius:40px; padding:10px 30px; font-size:15px; letter-spacing:5px; color:rgba(255,120,120,0.85); text-transform:uppercase; margin-bottom:32px; font-weight:600; }
  .lbl { font-size:22px; letter-spacing:9px; color:rgba(255,255,255,0.44); text-transform:uppercase; margin-bottom:10px; }
  .num { font-size:300px; font-weight:900; line-height:0.88;
    background:linear-gradient(135deg,#FFD700 0%,#C9A227 28%,#FFD700 55%,#FFF3A3 100%);
    -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text;
    letter-spacing:-16px; filter:drop-shadow(0 0 70px rgba(255,215,0,0.68));
  }
  .unit { font-size:32px; letter-spacing:14px; color:rgba(255,215,0,0.72); text-transform:uppercase; margin-bottom:52px; margin-top:12px; }
  .divider { width:300px; height:1.5px; background:linear-gradient(90deg,transparent,#C9A227,transparent); margin-bottom:48px; }
  .headline { font-size:46px; font-weight:700; color:#fff; line-height:1.26; margin-bottom:20px; max-width:880px; }
  .headline em { font-style:normal; background:linear-gradient(90deg,#FFD700,#FFF3A3); -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text; }
  .sub { font-size:26px; color:rgba(255,255,255,0.42); max-width:820px; line-height:1.6; margin-bottom:44px; }
  .pill-row { display:flex; gap:14px; margin-bottom:52px; flex-wrap:wrap; justify-content:center; }
  .pill { font-size:18px; font-weight:600; color:rgba(255,215,0,0.85); background:rgba(201,162,39,0.12); border:1px solid rgba(201,162,39,0.35); border-radius:40px; padding:12px 26px; }
  .box { display:inline-flex; flex-direction:column; align-items:center; background:rgba(201,162,39,0.11); border:1px solid rgba(201,162,39,0.46); border-radius:8px; padding:24px 70px; margin-bottom:56px; }
  .box-lbl { font-size:13px; letter-spacing:6px; color:rgba(201,162,39,0.62); text-transform:uppercase; margin-bottom:8px; }
  .box-date { font-size:32px; font-weight:700; color:#FFD700; letter-spacing:3px; }
  .bot-line { width:1px; height:80px; background:linear-gradient(180deg,rgba(201,162,39,0.50),transparent); margin-bottom:36px; }
  .logo-img { height:72px; opacity:0.88; filter:drop-shadow(0 0 20px rgba(255,215,0,0.30)); }
</style>
</head>
<body>
<div class="canvas">
  <div class="aurora"></div><div class="grid"></div>
  <div class="border-glow"></div>
  <div class="corner corner-tl"></div><div class="corner corner-tr"></div>
  <div class="corner corner-bl"></div><div class="corner corner-br"></div>
  <div class="dot" style="width:7px;height:7px;top:7%;left:8%;opacity:0.28"></div>
  <div class="dot" style="width:9px;height:9px;top:11%;right:9%;opacity:0.24"></div>
  <div class="dot" style="width:5px;height:5px;bottom:7%;left:6%;opacity:0.28"></div>
  <div class="dot" style="width:7px;height:7px;bottom:11%;right:8%;opacity:0.25"></div>
  <div class="dot" style="width:4px;height:4px;top:48%;left:3%;opacity:0.20"></div>
  <div class="dot" style="width:4px;height:4px;top:54%;right:3%;opacity:0.20"></div>
  <div class="content">
    <div class="top-line"></div>
    <div class="alert-pill">⚡ Cuenta regresiva activa</div>
    <div class="lbl">Faltan</div>
    <div class="num">4</div>
    <div class="unit">Horas</div>
    <div class="divider"></div>
    <div class="headline"><em>¿Ya tienes tu acceso?</em><br>Aún estás a tiempo</div>
    <div class="sub">Esta noche a las 9 PM el sistema abre. No te quedes por fuera.</div>
    <div class="pill-row">
      <span class="pill">🤖 IA que vende por ti</span>
      <span class="pill">📊 CRM Inteligente</span>
      <span class="pill">🎓 Academia Completa</span>
    </div>
    <div class="box">
      <div class="box-lbl">Lanzamiento oficial</div>
      <div class="box-date">Lunes 6 · 9:00 PM</div>
    </div>
    <div class="bot-line"></div>
    <img class="logo-img" src="../logo-skyteam-white.png" alt="Sky Team">
  </div>
</div>
</body>
</html>
