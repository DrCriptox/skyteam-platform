<!DOCTYPE html>
<html lang="es">
<!--
  SKY TEAM — FLYER TEMPLATE
  Para capturar: Abre en Chrome, presiona F11 (pantalla completa),
  luego toma screenshot con Windows+Shift+S y selecciona el cuadrado del flyer.
  Tamaño: 1080x1080px (formato cuadrado WhatsApp/Instagram)
-->
<head>
<meta charset="UTF-8">
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body { background:#000; display:flex; align-items:center; justify-content:center; min-height:100vh; font-family:'Segoe UI',Arial,sans-serif; }

  .canvas {
    width: 1080px;
    height: 1080px;
    background: #070711;
    position: relative;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
  }

  /* Aurora background */
  .aurora {
    position: absolute;
    inset: 0;
    background:
      radial-gradient(ellipse 70% 50% at 20% 20%, rgba(138,43,226,0.18) 0%, transparent 60%),
      radial-gradient(ellipse 60% 60% at 80% 80%, rgba(0,100,255,0.14) 0%, transparent 60%),
      radial-gradient(ellipse 80% 40% at 50% 10%, rgba(201,162,39,0.10) 0%, transparent 50%),
      radial-gradient(ellipse 50% 70% at 90% 30%, rgba(255,100,50,0.08) 0%, transparent 50%);
  }

  /* Grid overlay */
  .grid {
    position: absolute;
    inset: 0;
    background-image:
      linear-gradient(rgba(255,215,0,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255,215,0,0.03) 1px, transparent 1px);
    background-size: 60px 60px;
  }

  /* Gold border */
  .border-glow {
    position: absolute;
    inset: 12px;
    border: 1px solid rgba(201,162,39,0.35);
    border-radius: 4px;
    box-shadow:
      inset 0 0 60px rgba(201,162,39,0.04),
      0 0 40px rgba(201,162,39,0.08);
  }

  /* Corner accents */
  .corner {
    position: absolute;
    width: 48px;
    height: 48px;
    border-color: #C9A227;
    border-style: solid;
    opacity: 0.7;
  }
  .corner-tl { top:20px; left:20px; border-width:2px 0 0 2px; }
  .corner-tr { top:20px; right:20px; border-width:2px 2px 0 0; }
  .corner-bl { bottom:20px; left:20px; border-width:0 0 2px 2px; }
  .corner-br { bottom:20px; right:20px; border-width:0 2px 2px 0; }

  /* Content */
  .content {
    position: relative;
    z-index:10;
    text-align:center;
    padding: 60px 80px;
    display:flex;
    flex-direction:column;
    align-items:center;
    gap:0;
  }

  .brand {
    font-size: 14px;
    letter-spacing: 8px;
    color: rgba(201,162,39,0.7);
    text-transform: uppercase;
    margin-bottom: 32px;
  }

  .countdown-label {
    font-size: 22px;
    letter-spacing: 6px;
    color: rgba(255,255,255,0.5);
    text-transform: uppercase;
    margin-bottom: 16px;
  }

  .countdown-main {
    font-size: 128px;
    font-weight: 900;
    line-height: 1;
    background: linear-gradient(135deg, #FFD700 0%, #C9A227 40%, #FFD700 70%, #FFF3A3 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    letter-spacing: -4px;
    margin-bottom: 0px;
    filter: drop-shadow(0 0 30px rgba(255,215,0,0.4));
  }

  .countdown-unit {
    font-size: 28px;
    letter-spacing: 10px;
    color: rgba(255,215,0,0.6);
    text-transform: uppercase;
    margin-bottom: 48px;
    margin-top: 8px;
  }

  .divider {
    width: 200px;
    height: 1px;
    background: linear-gradient(90deg, transparent, #C9A227, transparent);
    margin-bottom: 44px;
  }

  .headline {
    font-size: 32px;
    font-weight: 700;
    color: #fff;
    line-height: 1.3;
    margin-bottom: 20px;
    max-width: 780px;
  }

  .headline em {
    font-style: normal;
    background: linear-gradient(90deg, #FFD700, #FFF3A3);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  .subline {
    font-size: 20px;
    color: rgba(255,255,255,0.45);
    max-width: 600px;
    line-height: 1.5;
    margin-bottom: 48px;
  }

  .launch-box {
    display:inline-flex;
    flex-direction:column;
    align-items:center;
    background: rgba(201,162,39,0.10);
    border: 1px solid rgba(201,162,39,0.35);
    border-radius: 6px;
    padding: 20px 48px;
    margin-bottom: 40px;
  }

  .launch-label {
    font-size: 11px;
    letter-spacing: 5px;
    color: rgba(201,162,39,0.6);
    text-transform: uppercase;
    margin-bottom: 6px;
  }

  .launch-date {
    font-size: 26px;
    font-weight: 700;
    color: #FFD700;
    letter-spacing: 2px;
  }

  .url {
    font-size: 18px;
    letter-spacing: 4px;
    color: rgba(255,255,255,0.3);
    text-transform: lowercase;
    margin-top: 12px;
  }

  /* Particle dots */
  .particle {
    position: absolute;
    border-radius: 50%;
    background: #FFD700;
    opacity: 0.15;
  }
</style>
</head>
<body>
<div class="canvas">
  <div class="aurora"></div>
  <div class="grid"></div>
  <div class="border-glow"></div>
  <div class="corner corner-tl"></div>
  <div class="corner corner-tr"></div>
  <div class="corner corner-bl"></div>
  <div class="corner corner-br"></div>

  <!-- Particles -->
  <div class="particle" style="width:4px;height:4px;top:15%;left:10%"></div>
  <div class="particle" style="width:6px;height:6px;top:25%;right:12%"></div>
  <div class="particle" style="width:3px;height:3px;bottom:20%;left:8%"></div>
  <div class="particle" style="width:5px;height:5px;bottom:30%;right:9%"></div>
  <div class="particle" style="width:3px;height:3px;top:60%;left:5%"></div>

  <div class="content">
    <div class="brand">Sky Team Global</div>
    <div class="countdown-label">Faltan</div>
    <div class="countdown-main">2</div>
    <div class="countdown-unit">Días</div>
    <div class="divider"></div>
    <div class="headline">El sistema de <em>franquicia digital</em><br>más poderoso de la región</div>
    <div class="subline">IA entrenada para venderte · CRM inteligente · Academia completa</div>
    <div class="launch-box">
      <div class="launch-label">Lanzamiento oficial</div>
      <div class="launch-date">Lunes 7 · 9:00 PM</div>
    </div>
    <div class="url">skyteam.global</div>
  </div>
</div>
</body>
</html>
