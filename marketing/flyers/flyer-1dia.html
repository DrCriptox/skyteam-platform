<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body { background:#000; display:flex; align-items:center; justify-content:center; min-height:100vh; font-family:'Segoe UI',Arial,sans-serif; }
  .canvas {
    width:1080px; height:1920px; background:#070711;
    position:relative; overflow:hidden;
    display:flex; flex-direction:column; align-items:center; justify-content:center;
  }
  .aurora { position:absolute; inset:0; background:
    radial-gradient(ellipse 100% 40% at 50% 0%,  rgba(140,0,220,0.30) 0%, transparent 50%),
    radial-gradient(ellipse 80%  40% at 15% 50%, rgba(100,0,200,0.18) 0%, transparent 50%),
    radial-gradient(ellipse 80%  40% at 85% 50%, rgba(0,30,200,0.15) 0%, transparent 50%),
    radial-gradient(ellipse 100% 40% at 50% 100%,rgba(90,0,180,0.24) 0%, transparent 50%);
  }
  .grid { position:absolute; inset:0; background-image:linear-gradient(rgba(255,215,0,0.03) 1px,transparent 1px),linear-gradient(90deg,rgba(255,215,0,0.03) 1px,transparent 1px); background-size:90px 90px; }
  .border-glow { position:absolute; inset:18px; border:1px solid rgba(201,162,39,0.35); border-radius:6px; box-shadow:inset 0 0 120px rgba(201,162,39,0.04); }
  .corner { position:absolute; width:64px; height:64px; border-color:#C9A227; border-style:solid; opacity:0.72; }
  .corner-tl { top:26px; left:26px; border-width:2px 0 0 2px; }
  .corner-tr { top:26px; right:26px; border-width:2px 2px 0 0; }
  .corner-bl { bottom:26px; left:26px; border-width:0 0 2px 2px; }
  .corner-br { bottom:26px; right:26px; border-width:0 2px 2px 0; }
  .dot { position:absolute; border-radius:50%; background:#FFD700; opacity:0.22; }
  .content { position:relative; z-index:10; text-align:center; padding:80px 90px; display:flex; flex-direction:column; align-items:center; width:100%; }
  .top-line { width:1px; height:120px; background:linear-gradient(180deg,transparent,rgba(201,162,39,0.45),transparent); margin-bottom:44px; }
  .lbl { font-size:22px; letter-spacing:9px; color:rgba(255,255,255,0.40); text-transform:uppercase; margin-bottom:12px; }
  .num { font-size:340px; font-weight:900; line-height:0.88;
    background:linear-gradient(135deg,#FFD700 0%,#C9A227 30%,#FFD700 62%,#FFF3A3 100%);
    -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text;
    letter-spacing:-20px; filter:drop-shadow(0 0 70px rgba(255,215,0,0.60));
  }
  .unit { font-size:32px; letter-spacing:14px; color:rgba(255,215,0,0.65); text-transform:uppercase; margin-bottom:60px; margin-top:14px; }
  .divider { width:300px; height:1.5px; background:linear-gradient(90deg,transparent,#C9A227,transparent); margin-bottom:52px; }
  .headline { font-size:46px; font-weight:700; color:#fff; line-height:1.28; margin-bottom:22px; max-width:880px; }
  .headline em { font-style:normal; background:linear-gradient(90deg,#FFD700,#FFF3A3); -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text; }
  .sub { font-size:26px; color:rgba(255,255,255,0.40); max-width:820px; line-height:1.6; margin-bottom:60px; }
  .box { display:inline-flex; flex-direction:column; align-items:center; background:rgba(201,162,39,0.10); border:1px solid rgba(201,162,39,0.36); border-radius:8px; padding:26px 70px; margin-bottom:60px; }
  .box-lbl { font-size:13px; letter-spacing:6px; color:rgba(201,162,39,0.58); text-transform:uppercase; margin-bottom:8px; }
  .box-date { font-size:32px; font-weight:700; color:#FFD700; letter-spacing:3px; }
  .bot-line { width:1px; height:80px; background:linear-gradient(180deg,rgba(201,162,39,0.45),transparent); margin-bottom:36px; }
  .logo-img { height:72px; opacity:0.88; filter:drop-shadow(0 0 20px rgba(255,215,0,0.30)); }
</style>
</head>
<body>
<div class="canvas">
  <div class="aurora"></div><div class="grid"></div>
  <div class="border-glow"></div>
  <div class="corner corner-tl"></div><div class="corner corner-tr"></div>
  <div class="corner corner-bl"></div><div class="corner corner-br"></div>
  <div class="dot" style="width:6px;height:6px;top:8%;left:8%"></div>
  <div class="dot" style="width:8px;height:8px;top:13%;right:10%"></div>
  <div class="dot" style="width:5px;height:5px;bottom:8%;left:7%"></div>
  <div class="dot" style="width:7px;height:7px;bottom:13%;right:8%"></div>
  <div class="content">
    <div class="top-line"></div>
    <div class="lbl">Falta</div>
    <div class="num">1</div>
    <div class="unit">Día</div>
    <div class="divider"></div>
    <div class="headline">Mañana a las 9 PM<br><em>tu vida cambia para siempre</em></div>
    <div class="sub">La plataforma que une inteligencia artificial con libertad financiera real</div>
    <div class="box">
      <div class="box-lbl">Lanzamiento oficial</div>
      <div class="box-date">Lunes 6 · 9:00 PM</div>
    </div>
    <div class="bot-line"></div>
    <img class="logo-img" src="../logo-skyteam-white.png" alt="Sky Team">
  </div>
</div>
</body>
</html>
